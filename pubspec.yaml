name: fashion_design_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_mlkit_pose_detection: ^0.14.1
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.8.0
  
  image_picker: ^1.1.2
  http: ^1.2.2

  google_generative_ai: ^0.4.7
  flutter_dotenv: ^5.2.1 # <--- এটি অবশ্যই এখানে যুক্ত করবেন

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # <--- নিচের এই দুটি লাইন একদম বামে স্পেস মেইনটেইন করে যুক্ত করুন
  assets:
    - .env